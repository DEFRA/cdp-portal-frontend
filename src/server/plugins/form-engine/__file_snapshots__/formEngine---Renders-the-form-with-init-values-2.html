<!DOCTYPE html>
<html lang="en" class="govuk-template govuk-template--rebranded">
  <head>
    <meta charset="utf-8">
    <title>   | 
</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1d70b8">


  <link href="/.public/src/client/application.css" rel="stylesheet">

  </head>
  <body class="govuk-template__body">
    <script>document.body.className += ' js-enabled' + ('noModule' in HTMLScriptElement.prototype ? ' govuk-frontend-supported' : '');</script>

      <a href="#main-content" class="govuk-skip-link" data-module="govuk-skip-link">Skip to main content</a>



      <div class="govuk-width-container">
        <main class="govuk-main-wrapper app-main-wrapper" id="main-content">


  <form method="post" data-js="app-form-errors">
    <input type="hidden" name="csrfToken" value="test-token"/>

<fieldset class="govuk-fieldset">


          <div class="govuk-form-group app-form-group app-form-group-js">
  <label class="govuk-label app-label" for="textInput">
    Text input
  </label>
  <div id="textInput-hint" class="govuk-hint app-hint">
    without default
  </div>
  <input class="govuk-input app-input app-input--wide" id="textInput" name="textInput" type="text" value="test" aria-describedby="textInput-hint" data-1p-ignore="">
</div>




          <div class="govuk-form-group app-form-group app-form-group-js">
  <label class="govuk-label app-label" for="textInputDefault">
    Text input
  </label>
  <div id="textInputDefault-hint" class="govuk-hint app-hint">
    with default
  </div>
  <input class="govuk-input app-input app-input--wide" id="textInputDefault" name="textInputDefault" type="text" value="test" aria-describedby="textInputDefault-hint" data-1p-ignore="">
</div>




          <div class="govuk-form-group app-form-group app-form-group-js">
  <label class="govuk-label app-label" for="selectInput">
    Select input
  </label>
  <div id="selectInput-hint" class="govuk-hint app-hint">
    without default
  </div>
  <input class="govuk-input app-input app-input--wide" id="selectInput" name="selectInput" type="text" value="another value" aria-describedby="selectInput-hint" data-1p-ignore="">
</div>




          <div class="govuk-form-group app-form-group app-form-group-js">
  <label class="govuk-label app-label" for="selectDefault">
    Select input
  </label>
  <div id="selectDefault-hint" class="govuk-hint app-hint">
    with default
  </div>
  <input class="govuk-input app-input app-input--wide" id="selectDefault" name="selectDefault" type="text" aria-describedby="selectDefault-hint" data-1p-ignore="">
</div>





</fieldset>

    <div class="govuk-button-group">
          <button value="submit" type="submit" name="actionButton" class="govuk-button app-button undefined" data-module="govuk-button">
  Submit
</button>
          <a class="app-link "  href="/">Cancel</a>
    </div>

  </form>


        </main>
      </div>


  </body>
</html>
